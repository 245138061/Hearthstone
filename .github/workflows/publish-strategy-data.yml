name: Publish Strategy Data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run publish pipeline tests
        run: python -m unittest discover -s tools/tests -p 'test_*.py'

      - name: Build static data bundle
        run: python tools/build_pages_bundle.py --output-dir site

      - name: Verify generated site
        run: python tools/verify_pages_bundle.py --site-dir site

      - name: Inspect generated site
        run: |
          pwd
          ls -lah
          ls -lah site
          find site -maxdepth 2 -type f | sort

      - name: Upload debug site artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-site
          path: site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
